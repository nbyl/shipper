name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+/;
            if (!pattern.test(title)) {
              core.setFailed(
                `PR title "${title}" does not follow Conventional Commits.\n` +
                `Expected format: type(optional scope): description\n` +
                `Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert\n` +
                `Example: "feat: add login button"`
              );
            }
